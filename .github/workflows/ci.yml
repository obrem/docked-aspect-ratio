name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AspectRatioChanger.sln

      - name: Build
        run: dotnet build AspectRatioChanger.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AspectRatioChanger.sln --configuration Release --no-build --verbosity normal

  release:
    name: Publish GitHub release
    runs-on: windows-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AspectRatioChanger.slnx

      - name: Publish win-x64 release
        run: dotnet publish AspectRatioChanger/AspectRatioChanger.csproj --configuration Release --runtime win-x64 --self-contained true --output artifacts/publish -p:DebugType=None -p:DebugSymbols=false

      - name: Remove debug symbols
        shell: pwsh
        run: Remove-Item artifacts/publish/*.pdb -Force -ErrorAction SilentlyContinue

      - name: Package release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = "AspectRatioChanger-$tag-win-x64.zip"
          Compress-Archive -Path artifacts/publish/* -DestinationPath $archive -Force
          "archive=$archive" >> $env:GITHUB_ENV

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" $env:archive --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"
